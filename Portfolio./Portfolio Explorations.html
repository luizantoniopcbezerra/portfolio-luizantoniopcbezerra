<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio Luiz Bezerra — Explorações</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Archivo:wght@400;500;600&family=Archivo+Black&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="variations/portfolio-data.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="variations/v1-crt-azul.jsx"></script>
<script type="text/babel" src="variations/v2-noite.jsx"></script>
<script type="text/babel" src="variations/v3-heroi.jsx"></script>
<script type="text/babel" src="variations/v4-editorial.jsx"></script>
<script type="text/babel" src="variations/v5-intellij.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard, DCPostIt, V1, V2, V3, V4, V5 } = window;

  function App() {
    return (
      <DesignCanvas>
        <DCSection
          id="exploracoes"
          title="Portfolio Luiz Bezerra — 5 direções"
          subtitle="Conteúdo real do repo (5 projetos, textos PT/EN com toggle funcional em cada opção). Azul como cor-âncora em todas; clique em qualquer prancheta para ver em tela cheia."
        >
          <DCPostIt top={-10} left={-230} rotate={-3} width={200}>
            Premissas: manter as mesmas seções (hero, sobre, projetos), sem seções novas. Azul inspirado nos seus heróis favoritos — do fósforo de terminal ao azul-tinta.
          </DCPostIt>
          <DCArtboard id="v1" label="V1 · CRT Azul — retrô refinado" width={1280} height={2030}>
            <V1 />
          </DCArtboard>
          <DCArtboard id="v2" label="V2 · Noite — navy + azul elétrico" width={1280} height={2630}>
            <V2 />
          </DCArtboard>
          <DCArtboard id="v3" label="V3 · Herói — azul + vermelho, bold" width={1280} height={2305}>
            <V3 />
          </DCArtboard>
          <DCArtboard id="v4" label="V4 · Editorial — claro, tinta azul" width={1280} height={2380}>
            <V4 />
          </DCArtboard>
          <DCArtboard id="v5" label="V5 · JetBrains.com — gradiente da marca, preto + azul" width={1280} height={2860}>
            <V5 />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
